<!DOCTYPE html>
<html>

<head>
    <title>校园顺路带</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/jquery-1.11.3.min.js"></script>
    <script src="../js/jquery.mobile-1.4.5.min.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <script type="text/javascript" src="../js/common.js"></script>

    <script>
        $(function () {
            var f = localStorage.getItem('from');
            var t = localStorage.getItem('to');
            var time = localStorage.getItem('time');
            
            // 强制设置时间输入框样式
            setTimeout(function() {
                $('#time').css({
                    'padding-left': '52px',
                    'position': 'relative'
                });
                
                // 如果jQuery Mobile已经包装了输入框，则同时设置包装元素
                var timeInputWrapper = $('#time').closest('.ui-input-text, .ui-input-search');
                if (timeInputWrapper.length > 0) {
                    timeInputWrapper.find('input[type="datetime-local"]').css('padding-left', '52px');
                }
            }, 100);
            
            // 简单开关按钮
            $('#simple-switch').click(function() {
                $(this).toggleClass('active');
                if ($(this).hasClass('active')) {
                    $(this).text('开');
                    $('#myswitch').val('1');
                } else {
                    $(this).text('关');
                    $('#myswitch').val('0');
                }
            });
            
            //出发地
            if (f) {
                f = f.split("#");
                $('#from-txt').val(f[0]);
                f = f[1].split(',')
                $('#from').val(f[0]);//经度
                $('#from2').val(f[1]);//纬度
            }
            //目的地
            if (t) {
                t = t.split("#");
                $('#to-txt').val(t[0]);
                t = t[1].split(',')
                $('#to').val(t[0]);//经度
                $('#to2').val(t[1]);//纬度
            }
            if (time) {
                $('#time').val(time);
            }
            $('#time').blur(function () {
                localStorage.setItem('time', $(this).val());
            });
            
            // ✅ 终极修复：使用click事件替代tap事件
            $(document).on('click', '#from-txt', function(e) {
                e.preventDefault();
                window.location.href = "../map.html?type=f";
            });
            $(document).on('click', '#to-txt', function(e) {
                e.preventDefault();
                window.location.href = '../map.html?type=t';
            });
            
            // 监听页面显示事件，更新地址显示
            $(document).on('pageshow', '#pageone', function() {
                updateAddressDisplay();
            });
            
            // 页面加载时也更新一次
            updateAddressDisplay();
        });
        
        // 更新地址显示的函数
        function updateAddressDisplay() {
            var f = localStorage.getItem('from');
            var t = localStorage.getItem('to');
            
            //出发地
            if (f) {
                f = f.split("#");
                $('#from-txt').val(f[0]);
                f = f[1].split(',')
                $('#from').val(f[0]);//经度
                $('#from2').val(f[1]);//纬度
            }
            //目的地
            if (t) {
                t = t.split("#");
                $('#to-txt').val(t[0]);
                t = t[1].split(',')
                $('#to').val(t[0]);//经度
                $('#to2').val(t[1]);//纬度
            }
        }
        
        // ✅ 修复提交按钮事件
        $('#go').off('click').on('click', function () {
            //pop提示
            if ($('#from-txt').val() == '') {
                showMsg('请选择出发地');
                return;
            } else if ($('#to-txt').val() == '') {
                showMsg('请选择目的地');
                return;
            } else if ($('#time').val() == '') {
                showMsg('请选择出发时间');
                return;
            }
            
            // ✅ 时间验证（双重保障）
            var selectedTime = new Date($('#time').val());
            var now = new Date();
            if (selectedTime < now) {
                showMsg('出发时间不能是过去时间，请选择当前时间或之后的时间');
                return;
            }

            //ajax提交行程
            $.postForm("/stroke/api/publish", '#tripForm', function (d) {
                if (d.code == 200) {
                    showMsg('发布成功');
                    window.location.href = 'trip.html';
                } else {
                    showMsg(d.message);
                }
            });
        });

        $('#myPopupDialog').popup();
    </script>
</head>

<body>


    <div data-role="page" id="pageone" class="bg-img">
        <div data-role="header" data-position="fixed" data-tap-toggle="false">
            <a href="javascript:changeRole()" class="ui-btn ui-btn-inline ui-corner-all" style="background-color: #e8ecef !important; color: #6c757d !important;">
                <i class="fas fa-exchange-alt" style="color: #6c757d !important;"></i> 切换角色
            </a>
            <h1 style="line-height: 1.6; padding: 8px 0; margin: 0;">
                <i class="fas fa-hands-helping" style="color: #3498db;"></i> 校园顺路带
            </h1>
        </div>
        <div style="margin-top:8px;"></div>
        <div data-role="main" class="ui-content">
            <div class="ui-content2">
                <div style="text-align: center; margin-bottom: 18px; padding: 12px; width: 95%; margin: 0 auto; background: linear-gradient(135deg, #5dade2 0%, #3498db 100%); border-radius: 10px; color: white;">
                    <i class="fas fa-hands-helping" style="font-size: 28px; margin-bottom: 10px; color: #ffffff;"></i>
                    <h2 style="margin: 0; font-size: 20px;">求助模式</h2>
                    <p style="margin: 5px 0 0 0; opacity: 0.9;">寻找顺路的接单同学</p>
                </div>
                
                <form id="tripForm">
                    <div class="input-group">
                        <label for="time" class="required">出发时间</label>
                        <div style="position: relative;">
                            <i class="fas fa-clock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff; z-index: 2;"></i>
                            <input type="datetime-local" name="departureTime" id="time" class="time-input">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="from-txt" class="required">出发地</label>
                        <div style="position: relative;">
                            <i class="fas fa-map-marker-alt" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff;"></i>
                            <input id="from-txt" name="startAddr" readonly="true" placeholder="请选择出发地点" style="padding-left: 40px; cursor: pointer;">
                            <input id="from" name="startGeoLng" type="hidden">
                            <input id="from2" name="startGeoLat" type="hidden">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="to-txt" class="required">目的地</label>
                        <div style="position: relative;">
                            <i class="fas fa-flag" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff;"></i>
                            <input id="to-txt" name="endAddr" readonly="true" placeholder="请选择目的地点" style="padding-left: 40px; cursor: pointer;">
                            <input id="to" name="endGeoLng" type="hidden">
                            <input id="to2" name="endGeoLat" type="hidden">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="switch-label">
                            <span>闪电确认</span>
                        </div>
                        <div class="simple-switch" id="simple-switch">
                            关
                        </div>
                        <!-- 隐藏的表单字段保持不变 -->
                        <input type="hidden" id="myswitch" name="quickConfirm" value="0">
                    </div>

                    <input name="quantity" value="1" type="hidden"/>
                    <input type="hidden" name="role" value="0">
                    <input type="hidden" name="status" value="0">
                    
                    <button type="button" class="ui-btn-active" id="go" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 16px;">
                        <i class="fas fa-paper-plane"></i> 发布求助行程
                    </button>
                </form>
            </div>
        </div>



        <div style="margin-bottom:4px;"></div>
        <div data-role="footer" data-position="fixed" data-tap-toggle="false">
            <div data-role="navbar" style="margin: 0;">
                <ul>
                    <li><a href="javascript:location.href='user.html'" class="ui-btn-active">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a></li>
                    <li><a href="javascript:location.href='trip.html'">
                        <i class="fas fa-route"></i>
                        <span>我的行程</span>
                    </a></li>
                    <li><a href="javascript:location.href='order.html'">
                        <i class="fas fa-list"></i>
                        <span>我的订单</span>
                    </a></li>
                    <li><a href="javascript:location.href='../common/userCenter.html'">
                        <i class="fas fa-user"></i>
                        <span>个人中心</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

</body>

</html>
