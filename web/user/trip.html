<!DOCTYPE html>
<html>

<head>
    <title>校园顺路带</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/jquery-1.11.3.min.js"></script>
    <script src="../js/jquery.mobile-1.4.5.min.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <script type="text/javascript" src="../js/common.js"></script>

    <script>
        var statusColor = { 1: 'dodgerblue', 2:'goldenrod', 3: 'green', 4: 'red' }
        var statusTo = {0: 'tripDetail', 1: 'tripConfirmed', 2:'tripConfirmed', 3: 'tripInfo', 4: 'tripInfo'}

        $.ajax({
            type: "POST",
            url: "/stroke/api/list",
            // type : "GET",
            // url:"../mock/trip.json",
            cache: false,
            data: '{"role":' + localStorage.getItem('current_role') + '}',
            success: function (d) {
                $('#defaultpanel').empty();
                if (d.data && d.data.length > 0) {
                    for (var i = 0; i < d.data.length; i++) {
                        var item = d.data[i];
                        item.departureTime = transDate(item.departureTime);
                        item.statusName = tripStatus[item.status];
                        item.statusColor = statusColor[item.status];
                        item.quickConfirm = item.quickConfirm == 1 ? '是' : '否';
                        renderByTemplate('#defaultpanel', '#template', item);
                    }
                    $('.trip-content').on("tap", function () {
                        window.location.href = statusTo[$(this).attr('status')] + '.html?id=' + $(this).attr('id');
                    });
                } else {
                    // 空状态提示 - 卡片式优化版本
                    $('#defaultpanel').html('<div class="empty-state">\n                        <i class="fas fa-inbox"></i>\n                        <h3>暂无行程</h3>\n                        <p>您还没有任何行程记录</p>\n                    </div>');
                }
            },
            error: function () {
                // 错误时也显示空状态 - 卡片式优化版本
                $('#defaultpanel').html('<div class="empty-state">\n                        <i class="fas fa-exclamation-circle" style="color: #e74c3c;"></i>\n                        <h3>加载失败</h3>\n                        <p>请检查网络连接或稍后重试</p>\n                    </div>');
            }
        });
    </script>
</head>

<body>
    <div id="template" style="display: none;">
        <div data-role="content" class="ui-content ui-content2 trip-content modern-card" id="{id}" status="{status}">
            <h4 style="color:darkgoldenrod">
                <i class="fas fa-clock" style="margin-right: 8px;"></i>{departureTime}
            </h4>
            <p>
                <i class="fas fa-map-marker-alt" style="margin-right: 8px;"></i><span>{startAddr}</span>
                <br>
                <i class="fas fa-arrow-right" style="margin-right: 8px;"></i><span>{endAddr}</span>
                <br>
                <i class="fas fa-bolt" style="margin-right: 8px;"></i>闪电确认：<span>{quickConfirm}</span>
            </p>
            <p style="text-align: right;height:20px;">
                <a href="#" style="cursor:pointer;text-decoration:none;">
                    <span style="color:{statusColor}">
                        {statusName}</span>
                </a>
            </p>
        </div>
    </div>

    <div data-role="page" id="pageone" class="bg-img modern-page user-mode" style="background-color: transparent !important;">
        <div data-role="header" data-position="fixed" data-tap-toggle="false">
            <a href="javascript:changeRole()" class="ui-btn ui-btn-inline ui-corner-all" style="background-color: #e8ecef !important; color: #6c757d !important;">
                <i class="fas fa-exchange-alt" style="color: #6c757d !important;"></i> 切换角色
            </a>
            <h1><i class="fas fa-route" style="margin-right: 8px; color: #3498db !important;"></i>求助模式 - 我的行程</h1>
        </div>
        <div style="margin-top:20px;" id="trips"></div>

        <div id="defaultpanel">
        </div>

        <div style="margin-bottom:20px;"></div>
        <div data-role="footer" data-position="fixed" data-tap-toggle="false">
            <div data-role="navbar" style="margin: 0;">
                <ul>
                    <li><a href="javascript:location.href='user.html'" class="ui-btn-active">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a></li>
                    <li><a href="javascript:location.href='trip.html'">
                        <i class="fas fa-route"></i>
                        <span>我的行程</span>
                    </a></li>
                    <li><a href="javascript:location.href='order.html'">
                        <i class="fas fa-list"></i>
                        <span>我的订单</span>
                    </a></li>
                    <li><a href="javascript:location.href='../common/userCenter.html'">
                        <i class="fas fa-user"></i>
                        <span>个人中心</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

</body>

</html>
