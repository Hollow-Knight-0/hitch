<!DOCTYPE html>
<html>

<head>
    <title>校园顺路带</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../css/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/jquery-1.11.3.min.js"></script>
    <script src="../js/jquery.mobile-1.4.5.min.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <script type="text/javascript" src="../js/common.js"></script>
    
    <style>
        /* 时间输入框样式调整 */
        .time-input {
            padding-left: 52px !important;
        }
        
        /* 输入框焦点样式 */
        input:focus {
            outline: 2px solid #3498db;
            outline-offset: 2px;
        }
    </style>

    <script>
        $(function () {
            // ✅ 设置最小时间为当前时间
            var now = new Date();
            var year = now.getFullYear();
            var month = String(now.getMonth() + 1).padStart(2, '0');
            var day = String(now.getDate()).padStart(2, '0');
            var hours = String(now.getHours()).padStart(2, '0');
            var minutes = String(Math.ceil(now.getMinutes() / 5) * 5).padStart(2, '0');
            
            var minDateTime = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
            $('#time').attr('min', minDateTime);
            
            // 强制设置时间输入框样式
            setTimeout(function() {
                $('#time').css({
                    'padding-left': '52px',
                    'position': 'relative'
                });
                
                // 如果jQuery Mobile已经包装了输入框，则同时设置包装元素
                var timeInputWrapper = $('#time').closest('.ui-input-text, .ui-input-search');
                if (timeInputWrapper.length > 0) {
                    timeInputWrapper.find('input[type="datetime-local"]').css('padding-left', '52px');
                }
            }, 100);
            
            var f = localStorage.getItem('from');
            var t = localStorage.getItem('to');
            var time = localStorage.getItem('time');
            //出发地
            if (f) {
                f = f.split("#");
                $('#from-txt').val(f[0]);
                f = f[1].split(',')
                $('#from').val(f[0]);//经度
                $('#from2').val(f[1]);//纬度
            }
            //目的地
            if (t) {
                t = t.split("#");
                $('#to-txt').val(t[0]);
                t = t[1].split(',')
                $('#to').val(t[0]);//经度
                $('#to2').val(t[1]);//纬度
            }
            if (time) {
                $('#time').val(time);
            }
            $('#time').blur(function () {
                localStorage.setItem('time', $(this).val());
                
                // ✅ 实时时间验证
                var selectedTime = new Date($(this).val());
                var now = new Date();
                if (selectedTime < now) {
                    showMsg('出发时间不能是过去时间，请选择当前时间或之后的时间');
                    $(this).val(''); // 清空无效时间
                    localStorage.removeItem('time');
                }
            });
            
            // ✅ 完善的地址选择功能
            $(document).on('click', '#from-txt', function(e) {
                e.preventDefault();
                localStorage.setItem('address_type', 'from');
                window.location.href = "../map.html?type=f";
            });
            $(document).on('click', '#to-txt', function(e) {
                e.preventDefault();
                localStorage.setItem('address_type', 'to');
                window.location.href = '../map.html?type=t';
            });
            
            // 监听页面显示事件
            $(document).on('pageshow', '#pageone', function() {
                updateAddressDisplay();
            });
            
            // 页面加载时也更新一次
            updateAddressDisplay();
            
            // ✅ 完善的提交按钮事件
            $('#go').off('click').on('click', function () {
                // 基础验证
                if ($('#from-txt').val() == '') {
                    showMsg('请选择出发地');
                    return;
                } else if ($('#to-txt').val() == '') {
                    showMsg('请选择目的地');
                    return;
                } else if ($('#time').val() == '') {
                    showMsg('请选择出发时间');
                    return;
                }
                
                // ✅ 双重时间验证
                var selectedTime = new Date($('#time').val());
                var now = new Date();
                if (selectedTime < now) {
                    showMsg('出发时间不能是过去时间，请选择当前时间或之后的时间');
                    return;
                }
                
                // 验证坐标是否完整
                if (!$('#from').val() || !$('#from2').val()) {
                    showMsg('出发地坐标信息不完整，请重新选择出发地');
                    return;
                }
                
                if (!$('#to').val() || !$('#to2').val()) {
                    showMsg('目的地坐标信息不完整，请重新选择目的地');
                    return;
                }

                // 显示加载状态
                var $btn = $(this);
                var originalText = $btn.html();
                $btn.html('<i class="fas fa-spinner fa-spin"></i> 发布中...').prop('disabled', true);

                // ajax提交行程
                $.postForm("/stroke/api/publish", '#tripForm', function (d) {
                    $btn.html(originalText).prop('disabled', false);
                    if (d.code == 200) {
                        showMsg('发布成功');
                        // 重置表单
                        $('#tripForm')[0].reset();
                        // 清除相关输入框的值
                        $('#from-txt').val('');
                        $('#to-txt').val('');
                        $('#time').val('');
                        // 清除隐藏字段
                        $('#from').val('');
                        $('#from2').val('');
                        $('#to').val('');
                        $('#to2').val('');
                        // 清除本地存储
                        localStorage.removeItem('from');
                        localStorage.removeItem('to');
                        localStorage.removeItem('time');
                        localStorage.removeItem('address_type');
                        // 延迟跳转，确保状态清理完成
                        setTimeout(function() {
                            window.location.href = 'trip.html';
                        }, 500);
                    } else {
                        showMsg(d.message);
                    }
                }).fail(function() {
                    $btn.html(originalText).prop('disabled', false);
                    showMsg('网络请求失败，请稍后重试');
                });
            });
        });
        
        // 更新地址显示的函数
        function updateAddressDisplay() {
            var f = localStorage.getItem('from');
            var t = localStorage.getItem('to');
            
            // 出发地
            if (f && f.includes('#')) {
                try {
                    var parts = f.split("#");
                    if (parts.length >= 2) {
                        $('#from-txt').val(parts[0]);
                        var coords = parts[1].split(',');
                        if (coords.length >= 2) {
                            // 确保坐标是有效的数字
                            var lng = parseFloat(coords[0]);
                            var lat = parseFloat(coords[1]);
                            if (!isNaN(lng) && !isNaN(lat)) {
                                $('#from').val(lng); // 经度
                                $('#from2').val(lat); // 纬度
                            }
                        }
                    }
                } catch(e) {
                    console.log('解析出发地坐标失败:', e);
                    // 清除无效数据
                    $('#from-txt').val('');
                    $('#from').val('');
                    $('#from2').val('');
                }
            }
            
            // 目的地
            if (t && t.includes('#')) {
                try {
                    var parts = t.split("#");
                    if (parts.length >= 2) {
                        $('#to-txt').val(parts[0]);
                        var coords = parts[1].split(',');
                        if (coords.length >= 2) {
                            // 确保坐标是有效的数字
                            var lng = parseFloat(coords[0]);
                            var lat = parseFloat(coords[1]);
                            if (!isNaN(lng) && !isNaN(lat)) {
                                $('#to').val(lng); // 经度
                                $('#to2').val(lat); // 纬度
                            }
                        }
                    }
                } catch(e) {
                    console.log('解析目的地坐标失败:', e);
                    // 清除无效数据
                    $('#to-txt').val('');
                    $('#to').val('');
                    $('#to2').val('');
                }
            }
        }
    </script>
</head>

<body>
    <div data-role="page" id="pageone">
        <div data-role="header" data-position="fixed" data-tap-toggle="false">
            <a href="javascript:changeRole()" class="ui-btn ui-btn-inline ui-corner-all" style="background-color: #e8ecef !important; color: #6c757d !important;">
                <i class="fas fa-exchange-alt" style="color: #6c757d !important;"></i> 切换角色
            </a>
            <h1 style="line-height: 1.6; padding: 8px 0; margin: 0;">
                <i class="fas fa-bicycle" style="color: #5dade2;"></i> 校园顺路带
            </h1>
        </div>

        <div style="margin-top:8px;"></div>
        <div data-role="main" class="ui-content">
            <div class="ui-content2">
                <div style="text-align: center; margin-bottom: 18px; padding: 12px; width: 95%; margin: 0 auto; background: linear-gradient(135deg, #5dade2 0%, #3498db 100%); border-radius: 10px; color: white;">
                    <i class="fas fa-bicycle" style="font-size: 28px; margin-bottom: 10px; color: #ffffff;"></i>
                    <h2 style="margin: 0; font-size: 20px;">接单模式</h2>
                    <p style="margin: 5px 0 0 0; opacity: 0.9;">提供顺路服务给求助同学</p>
                </div>
                
                <form id="tripForm">
                    <div class="input-group">
                        <label for="time" class="required">出发时间</label>
                        <div style="position: relative;">
                            <i class="fas fa-clock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff; z-index: 2;"></i>
                            <input type="datetime-local" name="departureTime" id="time" class="time-input">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="from-txt" class="required">出发地</label>
                        <div style="position: relative;">
                            <i class="fas fa-map-marker-alt" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff;"></i>
                            <input id="from-txt" name="startAddr" readonly="true" placeholder="请选择出发地点" style="padding-left: 40px; cursor: pointer;">
                            <input id="from" name="startGeoLng" type="hidden">
                            <input id="from2" name="startGeoLat" type="hidden">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="to-txt" class="required">目的地</label>
                        <div style="position: relative;">
                            <i class="fas fa-flag" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffffff;"></i>
                            <input id="to-txt" name="endAddr" readonly="true" placeholder="请选择目的地点" style="padding-left: 40px; cursor: pointer;">
                            <input id="to" name="endGeoLng" type="hidden">
                            <input id="to2" name="endGeoLat" type="hidden">
                        </div>
                    </div>

                    <!-- 座位数字段在接单模式下隐藏 -->
                    <!-- 默认传入100给后端 -->
                    <input type="hidden" name="quantity" value="100">
                    <input type="hidden" name="role" value="1">
                    <input type="hidden" name="status" value="0">
                    
                    <button type="submit" class="ui-btn-active" id="go" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 16px;">
                        <i class="fas fa-paper-plane"></i> 发布接单行程
                    </button>
                </form>
            </div>
        </div>



        <div style="margin-bottom:4px;"></div>
        <div data-role="footer" data-position="fixed" data-tap-toggle="false">
            <div data-role="navbar" style="margin: 0;">
                <ul>
                    <li><a href="javascript:location.href='user.html'" class="ui-btn-active">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a></li>
                    <li><a href="javascript:location.href='trip.html'">
                        <i class="fas fa-route"></i>
                        <span>我的行程</span>
                    </a></li>
                    <li><a href="javascript:location.href='order.html'">
                        <i class="fas fa-list"></i>
                        <span>我的订单</span>
                    </a></li>
                    <li><a href="javascript:location.href='../common/userCenter.html'">
                        <i class="fas fa-user"></i>
                        <span>个人中心</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </div>

</body>

</html>
