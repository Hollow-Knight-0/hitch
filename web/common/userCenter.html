<!DOCTYPE html>
<html>

<head>
    <title>校园顺路带</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/jquery.mobile-1.4.5.min.css">
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/jquery-1.11.3.min.js"></script>
    <script src="../js/jquery.mobile-1.4.5.min.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <script type="text/javascript" src="../js/common.js"></script>
    <style>
        html,
        body {
            padding: 0;
            margin: 0;
        }

        table .h {
            width: 100px;
            height: 50px;
            font-weight: bold;
        }

        img {
            width: 100%;
            height: 100%;
            max-height: 180px;
        }
        .ui-icon-carat-r {
            line-height:20px;
        }
    </style>
    <script>
        $(function () {

            $('.person-img').attr('src',current_user.avatar);
            $('#driverName').text((current_user.useralias == '') ? current_user.username : current_user.useralias);
            $('#valid').text((current_user.status == 1) ? '已完成' : '未完成');
            $('#driver').text((current_user.role == 1) ? '已完成' : '未完成');

            var roleName = (localStorage.getItem('current_role') == '0' ? 'user' : 'driver');
            $('.role').each(function(){
                $(this).attr('href','../'+roleName+'/'+$(this).attr('href'));
            });
            $('li').removeClass('ui-first-child');
        })
        function logout() {
            localStorage.clear();
            toUrl('/web/login.html');
        }
    </script>
</head>

<body>
    <div id="template" style="display: none;">
        
    </div>

    <div data-role="page" id="pageone">
        <div data-role="header" data-position="fixed" data-tap-toggle="false">
            <h1>
                <i class="fas fa-user-circle"></i> 个人中心
            </h1>
        </div>
        <div data-role="main" class="ui-content">
            <!-- 用户信息卡片 -->
            <div class="ui-content2" style="text-align: center; margin-bottom: 20px;">
                <div style="padding: 20px;">
                    <img class="person-img" src="" style="width: 80px; height: 80px; margin: 0 auto 15px; display: block; border: 3px solid #3498db; border-radius: 50%;">
                    <h2 id="driverName" style="margin: 10px 0; color: #2c3e50;"></h2>
                    <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                        <div style="text-align: center;">
                            <div style="font-size: 14px; color: #7f8c8d;">实名认证</div>
                            <div id="valid" style="color: #3498db; font-weight: bold; margin-top: 5px;"></div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 14px; color: #7f8c8d;">学生认证</div>
                            <div id="driver" style="color: #3498db; font-weight: bold; margin-top: 5px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 功能菜单 -->
            <div class="ui-content2">
                <ul data-role="listview" data-inset="false" style="margin: 0;">
            <li>
                <a data-ajax="false" href="javascript:toUrl('userMsg.html')" class="btn-icon">
                    <i class="fas fa-envelope icon-info"></i>
                    <span>我的消息</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li>
                <a data-ajax="false" href="javascript:toUrl('userEdit.html')" class="btn-icon">
                    <i class="fas fa-user-edit icon-info"></i>
                    <span>完善资料</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li>
                <a data-ajax="false" href="javascript:toUrl('alterPhoto.html')" class="btn-icon">
                    <i class="fas fa-camera icon-info"></i>
                    <span>修改头像</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li>
                <a data-ajax="false" href="javascript:toUrl('alterPwd.html')" class="btn-icon">
                    <i class="fas fa-key icon-warning"></i>
                    <span>修改密码</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li>
                <a data-ajax="false" href="javascript:toUrl('alterPaycode.html')" class="btn-icon">
                    <i class="fas fa-qrcode icon-success"></i>
                    <span>收款码</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li style="border-top: 1px solid #ecf0f1; margin-top: 5px; padding-top: 5px;">
                <a data-ajax="false" href="javascript:toUrl('userVerify.html')" class="btn-icon">
                    <i class="fas fa-id-card icon-warning"></i>
                    <span>实名认证</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li>
                <a data-ajax="false" href="javascript:toUrl('carVerify.html')" class="btn-icon">
                    <i class="fas fa-graduation-cap icon-success"></i>
                    <span>学生认证</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
            <li style="border-top: 1px solid #ecf0f1; margin-top: 5px; padding-top: 5px;">
                <a data-ajax="false" href="javascript:logout();" class="btn-icon" style="color: #e74c3c;">
                    <i class="fas fa-sign-out-alt icon-danger"></i>
                    <span>退出登录</span>
                    <i class="fas fa-chevron-right" style="float: right; color: #bdc3c7;"></i>
                </a>
            </li>
        </div>
        
        <!-- 底部提示 -->
        <div style="text-align: center; margin-top: 25px; color: #95a5a6; font-size: 12px;">
            <p><i class="fas fa-shield-alt"></i> 校园顺路带 v1.0</p>
            <p>让出行更便捷，让校园更温暖</p>
        </div>
    </div>
        <div data-role="footer" data-position="fixed" data-tap-toggle="false">
            <div data-role="navbar" style="margin: 0;" id="footerLink">
                <ul>
                    <li><a href="user.html" data-ajax="false" class="role">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </a></li>
                    <li><a href="trip.html" data-ajax="false" class="role">
                        <i class="fas fa-route"></i>
                        <span>我的行程</span>
                    </a></li>
                    <li><a href="order.html" data-ajax="false" class="role">
                        <i class="fas fa-list"></i>
                        <span>我的订单</span>
                    </a></li>
                    <li><a href="userCenter.html" data-ajax="false" class="ui-btn-active">
                        <i class="fas fa-user"></i>
                        <span>个人中心</span>
                    </a></li>
                </ul>
            </div>
        </div>

    </div>

</body>

</html>
