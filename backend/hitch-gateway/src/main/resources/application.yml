server:
  port: 8888
spring:
  application:
    name: hitch-gateway-server
  cloud:
    nacos:
      server-addr: 192.168.64.100:8848
    gateway:
      routes:
        # 账户服务API代理
        - id: hitch-account-server
          uri: lb://hitch-account-server
          predicates:
            - Path=/account/**
        # 库存服务API代理
        - id: hitch-storage-server
          uri: lb://hitch-storage-server
          predicates:
            - Path=/storage/**
        # 行程服务
        - id: hitch-stroke-server
          uri: lb://hitch-stroke-server
          predicates:
            - Path=/stroke/**
        # 订单服务
        - id: hitch-order-server
          uri: lb://hitch-order-server
          predicates:
            - Path=/order/**
        # 支付管理
        - id: hitch-payment-server
          uri: lb://hitch-payment-server
          predicates:
            - Path=/payment/**
        # 存储管理
        - id: hitch-storage-server
          uri: lb://hitch-storage-server
          predicates:
            - Path=/storage/**
        # 通知服务
        - id: hitch-notice-server
          uri: lb://hitch-notice-server
          predicates:
            - Path=/notice/**
        # 消息推送服务 websocket代理
        - id: hitch-notice-service-ws
          uri: lb:ws://hitch-notice-service
          predicates:
            - Path=/ws/**

      default-filters:
        - TokenAuth=/account/api/login;/account/api/register;/payment/api/nofify;/doc.html;/account/v2/api-docs;/order/v2/api-docs;/stroke/v2/api-docs;/notice/v2/api-docs;/payment/v2/api-docs;/storage/v2/api-docs;/swagger-resources;/webjars/**

#knife4j 自动聚合配置 统一管理 swagger 接口
#通过 http://localhost:8888/doc.html
knife4j:
  gateway:
    enabled: true
    strategy: discover  # 聚合策略
    discover:
      enabled: true
      version: swagger2
      excluded-services:
        - hitch-gateway-server


  redis:
    host: 192.168.64.100
    port: 6379
    timeout: 1000